schema_version = "1.0.0"

id = "o_oo_math_controller"

version = "0.4.5"

name = "Math Controller"

tagline = "Generate complex node networks automatically from text-based math formulas."
maintainer = "o_oo_Gote510"

type = "add-on"

platforms = ["windows-x64", "macos-arm64", "macos-x64", "linux-x64"]

blender_version_min = "5.0.1"

license = ["SPDX:GPL-3.0-or-later"]

tags = ["Geometry Nodes", "Node", "User Interface", "Compositing", "Material"]

[description]
base = """
Provides custom group nodes that analyze arithmetic expressions (e.g., 'sin(a) * b + 10') 
entered in a text field and automatically build an internal network of Math nodes.

Key Features:
- Full support for all Blender Math node functions.
- Secure and fast formula parsing using Python's AST (Abstract Syntax Tree).
- Multi-output management (f1, f2...) allowing values to be passed between formulas.
- Advanced formula editor with function guides and parenthesis level visualization.
- Supports conversion to standard Group Nodes for easy sharing.
- Compatible with Shader, Geometry, and Compositor node editors.
- Automatic node layout and alignment for clean internal structures.
"""

